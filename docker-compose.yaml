 version: "3.8"
 
 services:
   mysql:
     image: mysql:8.0
     container_name: hpms-mysql
     restart: unless-stopped
     environment:
       MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
       MYSQL_DATABASE: ${MYSQL_DATABASE:-hpms}
       MYSQL_USER: ${MYSQL_USER:-hpms}
       MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hpms_password}
     ports:
       - "3306:3306"
     volumes:
       - mysql_data:/var/lib/mysql
       - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
     command: >
       --character-set-server=utf8mb4
       --collation-server=utf8mb4_unicode_ci
       --default-authentication-plugin=mysql_native_password
     healthcheck:
       test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
       interval: 10s
       timeout: 5s
       retries: 5
 
   redis:
     image: redis:7-alpine
     container_name: hpms-redis
     restart: unless-stopped
     ports:
       - "6379:6379"
     volumes:
       - redis_data:/data
     command: redis-server --appendonly yes
     healthcheck:
       test: ["CMD", "redis-cli", "ping"]
       interval: 10s
       timeout: 5s
       retries: 5
 
   meilisearch:
     image: getmeili/meilisearch:v1.8
     container_name: hpms-meilisearch
     restart: unless-stopped
     environment:
       MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-hpms_master_key}
       MEILI_ENV: ${MEILI_ENV:-development}
     ports:
       - "7700:7700"
     volumes:
       - meilisearch_data:/meili_data
     healthcheck:
       test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
       interval: 15s
       timeout: 5s
       retries: 5
 
   backend:
     build:
       context: ./backend
       dockerfile: Dockerfile
     container_name: hpms-backend
     restart: unless-stopped
     depends_on:
       mysql:
         condition: service_healthy
       redis:
         condition: service_healthy
       meilisearch:
         condition: service_healthy
     env_file:
       - .env
     environment:
       - MYSQL_HOST=mysql
       - REDIS_HOST=redis
       - MEILISEARCH_HOST=http://meilisearch:7700
     ports:
       - "8000:8000"
     volumes:
       - backend_uploads:/app/uploads
     command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips "*" --reload
 
   celery-worker:
     build:
       context: ./backend
       dockerfile: Dockerfile
     container_name: hpms-celery-worker
     restart: unless-stopped
     depends_on:
       - backend
       - redis
     env_file:
       - .env
     environment:
       - MYSQL_HOST=mysql
       - REDIS_HOST=redis
       - MEILISEARCH_HOST=http://meilisearch:7700
     volumes:
       - ./backend:/app
     command: celery -A app.tasks.celery_app worker -l info --concurrency=4
 
   celery-beat:
     build:
       context: ./backend
       dockerfile: Dockerfile
     container_name: hpms-celery-beat
     restart: unless-stopped
     depends_on:
       - backend
       - redis
     env_file:
       - .env
     environment:
       - MYSQL_HOST=mysql
       - REDIS_HOST=redis
       - MEILISEARCH_HOST=http://meilisearch:7700
     volumes:
       - ./backend:/app
     command: celery -A app.tasks.celery_app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
 
   frontend:
     build:
       context: ./frontend
       dockerfile: Dockerfile
     container_name: hpms-frontend
     restart: unless-stopped
     depends_on:
       - backend
     ports:
       - "80:80"
     environment:
       - VITE_API_URL=/api
 
   playwright-service:
     build:
       context: ./playwright-service
       dockerfile: Dockerfile
     container_name: hpms-playwright
     restart: unless-stopped
     ports:
       - "8080:8080"
     shm_size: 2gb
 
 volumes:
   mysql_data:
   redis_data:
   meilisearch_data:
   backend_uploads:
